name: 'frontend'
replicaCount: 1

images:
    PullSecrets: [jawsreg]
    repository: jawsproject.azurecr.io/frontend
    tag: latest

service:
    ports:
        - name: http
          port: '80'

ingress:
    enabled: true
    hosts:
        - host: jaws.branch-yesodot.org
          paths:
              - path: /
                service: service
                port: '80'

config:
    configmaps: []
