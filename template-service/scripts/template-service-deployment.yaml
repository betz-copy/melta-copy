apiVersion: apps/v1
kind: Deployment
metadata:
    name: template-service
    labels:
        app: template-service
spec:
    replicas: 1
    selector:
        matchLabels:
            app: template-service
    template:
        metadata:
            labels:
                app: template-service
        spec:
            containers:
                - name: template-service
                  image: melta-template-service:latest
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 8000
                  env:
                      - name: PORT
                        value: '8000'
                      - name: MONGO_URL
                        value: 'mongodb://mongo/template-service?replicaSet=rs0'
                      - name: RABBIT_URL
                        value: 'amqp://rabbit'
                      - name: MONGO_RELATIONSHIP_TEMPLATES_COLLECTION_NAME
                        value: 'relationship-templates'
                      - name: MONGO_RULES_COLLECTION_NAME
                        value: 'rules'
                      - name: MONGO_ENTITY_TEMPLATES_COLLECTION_NAME
                        value: 'entity-templates'
                      - name: MONGO_CATEGORIES_COLLECTION_NAME
                        value: 'categories'
                      - name: TEMPLATE_SERVICE_URL
                        value: 'http://template-service:8000'
                      - name: MAX_REQUEST_BYTE_SIZE
                        value: '1000000000'
                      - name: ELASTIC_APM_ACTIVE
                        value: 'false'
# kubectl delete deployment --all
# kubectl apply -f ~/melta/melta/template-service/scripts/template-service-deployment.yaml
