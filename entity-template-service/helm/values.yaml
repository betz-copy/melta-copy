name: "entity-template-service"
replicaCount: 1

images:
  PullSecrets: [jawsreg]
  repository: jawsproject.azurecr.io/entity-template-service
  tag: latest

service:
  ports:
  - name: http
    port: "8000"

livenessProbe:
  httpGet:
    path: /health
    port: 8000

readinessProbe:
  httpGet:
    path: /health
    port: 8000

config:
  configmaps: []
  env:
    - name: PORT
      value: 8000
    - name: MONGO_URL
      value: mongodb+srv://jaws:jcfVBJQW73BobDvr@cluster0.t8onr.mongodb.net/templates?retryWrites=true&w=majority
    - name: MONGO_ENTITY_TEMPLATES_COLLECTION_NAME
      value: entity-templates
    - name: MONGO_CATEGORIES_COLLECTION_NAME
      value: categories
    - name: RELATIONSHIP_TEMPLATE_SERVICE_URL
      value: http://relationship-template-service:8000
    - name: RABBIT_URL
      value: amqp://jaws:jawsAreTheBest@20.105.9.117:5672/jaws
