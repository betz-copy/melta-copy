version: '3.4'

services:
  storage-service:
    image: storage-service
    build: .
    depends_on:
      - minio
    ports:
      - '8000:8000'
    environment:
      MINIO_ENDPOINT: 'minio'
      MINIO_BUCKET_NAME: 'test'
      DELETE_FILES_DELAY: 60000
      SYSTEM_MELTA_BASE_URL: http://localhost
    restart: 'always'

  minio:
    image: minio/minio
    ports:
      - '9000:9000'
      - '9001:9001'
      - '3000:3000'
    environment:
      MINIO_ROOT_USER: 'minioadmin'
      MINIO_ROOT_PASSWORD: 'minioadmin'
    command: 'minio server --console-address :3000 /data'

  rabbit:
    image: rabbitmq:3-management
    ports:
      - 5672:5672
      - 15672:15672
