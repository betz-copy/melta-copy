version: "3.4"

services:
  #-------------------------------------------#
  #*   Service infrastructure dependencies:   #
  #-------------------------------------------#
  mongo:
    image: mongo:4.4.1
    restart: always
    entrypoint: ["/usr/bin/mongod", "--bind_ip_all", "--replSet", "rs0"]
    ports:
      - 27017:27017

  mongosetup:
    image: mongo:4.4.1
    depends_on:
      - mongo
    volumes:
      - ./scripts:/scripts
    restart: "no"
    entrypoint: ["bash", "/scripts/setup_mongo.sh"]

  rabbit:
    image: rabbitmq:3-management
    ports:
      - 5672:5672
      - 15672:15672
    restart: always

  redis:
    image: redis:latest
    ports:
      - 6379:6379
    restart: always

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
      - "4000:4000"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    command: "minio server --console-address :4000 /data"
    restart: always

  neo4j:
    build:
      context: ./instance-service
      dockerfile: Dockerfile-neo4j
    environment:
      - NEO4J_AUTH=neo4j/test
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: always

  # ELK
  elastic:
    image: elasticsearch:8.11.2
    container_name: elastic
    volumes:
      - elastic_data:/usr/share/elasticsearch/data/
      - ./elk/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    environment:
      - discovery.type=single-node
      - http.host=0.0.0.0
      - transport.host=0.0.0.0
      - xpack.security.enabled=false
      - cluster.name=elasticsearch
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - 9200:9200
    restart: always
    deploy:
      resources:
        limits:
          memory: 1024m

  logstash:
    image: logstash:8.11.2
    container_name: logstash
    environment:
      - LS_JAVA_OPTS=-Xmx512m -Xms512m
      - PIPELINE_WORKERS=2
      - BATCH_SIZE=50
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - ./elk/logstash.yml:/usr/share/logstash/config/logstash.yml
      - logstash_data:/usr/share/logstash/data
    depends_on:
      - elastic
    deploy:
      resources:
        limits:
          memory: 1024m

  kibana:
    image: kibana:8.11.2
    container_name: kibana
    volumes:
      - ./elk/kibana.yml:/usr/share/kibana/config/kibana.yml
      - kibana_data:/usr/share/kibana/data
    ports:
      - 5601:5601
    depends_on:
      - elastic
    restart: always
    deploy:
      resources:
        limits:
          memory: 1024m

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.5.1
    container_name: filebeat
    user: root
    volumes:
      - logs:/var/log/test
      - ./elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      - logstash
    command: filebeat -e -strict.perms=false

  mock-service:
    build: ./mock-service
    environment:
      TEMPLATE_SERVICE_URL: ${TEMPLATE_SERVICE_URL}
      INSTANCE_SERVICE_URL: ${INSTANCE_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      PROCESS_SERVICE_URL: ${PROCESS_SERVICE_URL}
      STORAGE_SERVICE_URL: ${STORAGE_SERVICE_URL}
      GANTT_SERVICE_URL: ${GANTT_SERVICE_URL}
      WORKSPACES_SERVICE_URL: ${WORKSPACE_SERVICE_URL}
      USER_SERVICE_MANAGERS_KARTOFFEL_IDS: 5e5688324203fc40043591aa,61d37cb5e4de0300121e31ef
      PROCESS_SERVICE_REVIEWERS_KARTOFFEL_IDS: 5e5688d54203fc40043591ac,5e5689514203fc40043591ae,6618026a26928782bb9c16ca
      DB_HEADER_NAME: ${DB_HEADER_NAME}
    depends_on:
      - neo4j
      - template-service
      - storage-service
      - instance-service
      - user-service
      - process-service
      - gantt-service
      - workspace-service
    restart: on-failure

  #-------------------------------------------#
  #        microservices:                     #
  #-------------------------------------------#

  template-service:
    ports:
      - 8002:8000
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  gateway-service:
    ports:
      - 8003:8000
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  user-service:
    ports:
      - 8005:8000
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  storage-service:
    ports:
      - 8006:8000
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  instance-service:
    ports:
      - 8007:8000
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  nginx:
    ports:
      - 80:80
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  global-search-service:
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  activity-log-service:
    restart: always

  notification-service:
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  rule-breach-service:
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  process-service:
    ports:
      - 8008:8000
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  gantt-service:
    ports:
      - 8009:8000
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  mailer-service:
    depends_on:
      - redis
    ports:
      - 8010:8000
    restart: always

  preview-service:
    ports:
      - 8011:8000
    restart: always
    volumes:
      - logs:/usr/src/app/logs

  workspace-service:
    ports:
      - 8012:8000
    restart: always

volumes:
  elastic_data:
  logstash_data:
  kibana_data:
  logs: {}
