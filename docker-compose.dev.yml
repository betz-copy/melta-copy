version: "3.4"

services:
  #-------------------------------------------#
  #*   Service infrastructure dependencies:   #
  #-------------------------------------------#
  mongo:
    image: mongo
    restart: always
    entrypoint: ['/usr/bin/mongod', '--bind_ip_all', '--replSet', 'rs0']
    ports:
      - 27017:27017

  mongosetup:
    image: mongo
    depends_on:
      - mongo
    volumes:
      - ./scripts:/scripts
    restart: "no"
    entrypoint: [ "bash", "/scripts/setup_mongo.sh"]

  rabbit:
    image: rabbitmq:3-management
    ports:
      - 5672:5672
      - 15672:15672

  minio:
    image: minio/minio
    ports: 
      - "9000:9000"
      - "9001:9001"
      - "4000:4000"
    environment: 
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    command: "minio server --console-address :4000 /data"

  neo4j:
    image: neo4j:latest
    environment:
      - NEO4J_AUTH=neo4j/pass
    ports:
      - "7474:7474"
      - "7687:7687"

  mock:
    # image: jawsproject.azurecr.io/mock
    build: ./mock
    environment:
      ENTITY_TEMPLATE_MANAGER_URI: ${ENTITY_TEMPLATE_MANAGER_URI}
      RELATIONSHIP_TEMPLATE_MANAGER_URI: ${RELATIONSHIP_TEMPLATE_MANAGER_URI}
      INSTANCE_MANAGER_URI: ${INSTANCE_MANAGER_URI}
    depends_on:
      - neo4j
      - entity-template-manager
      - relationship-template-manager
      - instance-manager

  #-------------------------------------------#
  #        microservices:                     #
  #-------------------------------------------#
  entity-template-manager:
    ports:
      - 8001:8000

  relationship-template-manager:
    ports:
      - 8002:8000

  backend:
    ports:
      - 8003:8000

  permission-api:
    ports:
      - 8005:8000
  
  storage-service:
    ports:
      - 8006:8000

  instance-manager:
    ports:
      - 8007:8000
  
  gateway:
    ports:
      - 80:80
