version: '3.8'

x-common: &common
  restart: always
  networks: [network]
  profiles: ['common']

x-analytics_common: &analytics_common
  restart: unless-stopped
  networks: [network]
  profiles: ['analytics']

services:
  #-------------------------------------------#
  #*   Service infrastructure dependencies:   #
  #-------------------------------------------#
  mongo:
    image: mongo:4.4.1
    <<: *common
    entrypoint: ['/usr/bin/mongod', '--bind_ip_all', '--replSet', 'rs0', '--wiredTigerCacheSizeGB', '0.25']
    mem_limit: 600m
    ports:
      - 27017:27017

  mongosetup:
    image: mongo:4.4.1
    <<: *common
    depends_on:
      - mongo
    volumes:
      - ./scripts:/scripts
    restart: 'no'
    entrypoint: ['bash', '/scripts/setup_mongo.sh']
    networks:
      - network

  rabbit:
    image: rabbitmq:3.13-management-alpine
    <<: *common
    environment:
      - VM_MEMORY_HIGH_WATERMARK=0.45
    mem_limit: 400m
    ports:
      - 5672:5672
      - 15672:15672

  redis:
    image: redis:7-alpine
    <<: *common
    command: ['redis-server', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    mem_limit: 300m
    ports:
      - 6379:6379

  minio:
    image: minio/minio
    command: 'minio server --console-address :4000 /data'
    <<: *common
    ports:
      - '9000:9000'
      - '9001:9001'
      - '4000:4000'
    environment:
      MINIO_ROOT_USER: 'minioadmin'
      MINIO_ROOT_PASSWORD: 'minioadmin'
    mem_limit: 400m

  neo4j:
    build:
      context: ./instance-service
      dockerfile: Dockerfile-neo4j
    <<: *common
    environment:
      - NEO4J_AUTH=neo4j/test1234
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=256m
      - NEO4J_dbms_memory_pagecache_size=256m
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    ports:
      - '7474:7474'
      - '7687:7687'
    mem_limit: 1g

  mysql:
    image: mysql
    command:
      - --innodb-buffer-pool-size=128M
      - --key_buffer_size=16M
    <<: *analytics_common
    environment:
      - MYSQL_ROOT_PASSWORD=matomo
      - MYSQL_DATABASE=analytics
      - MYSQL_USER=matomo
      - MYSQL_PASSWORD=matomo
    mem_limit: 512m

  matomo:
    image: matomo
    <<: *analytics_common
    environment:
      - MATOMO_DATABASE_HOST=mysql
      - MATOMO_DATABASE_USERNAME=matomo
      - MATOMO_DATABASE_PASSWORD=matomo
      - MATOMO_DATABASE_DBNAME=analytics
      - PHP_MEMORY_LIMIT=256M
    mem_limit: 400m
    ports:
      - 8016:80

  # ELK
  elastic:
    image: elasticsearch:8.13.0
    container_name: elastic
    <<: *common
    volumes:
      - elastic_data:/usr/share/elasticsearch/data/
      - ./elk/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    environment:
      - discovery.type=single-node
      - http.host=0.0.0.0
      - transport.host=0.0.0.0
      - xpack.security.enabled=false
      - cluster.name=elasticsearch
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - indices.memory.index_buffer_size=5%
    ports:
      - 9200:9200
    mem_limit: 800m
    profiles: ['common', 'analytics']

  logstash:
    image: logstash:8.13.0
    container_name: logstash
    <<: *analytics_common
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - PIPELINE_WORKERS=1
      - BATCH_SIZE=50
    ports:
      - '5044:5044'
      - '9600:9600'
    volumes:
      - ./elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - ./elk/logstash.yml:/usr/share/logstash/config/logstash.yml
      - logstash_data:/usr/share/logstash/data
    depends_on:
      - elastic
    mem_limit: 400m

  kibana:
    image: kibana:8.13.0
    container_name: kibana
    <<: *analytics_common
    environment:
      - NODE_OPTIONS=--max-old-space-size=512
    volumes:
      - ./elk/kibana.yml:/usr/share/kibana/config/kibana.yml
      - kibana_data:/usr/share/kibana/data
    ports:
      - 5601:5601
    depends_on:
      - elastic
    mem_limit: 600m

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.5.1
    container_name: filebeat
    <<: *analytics_common
    user: root
    volumes:
      - logs:/var/log/test
      - ./elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      - logstash
    command: ['filebeat', '-e', '-strict.perms=false']
    mem_limit: 200m

  mock-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'mock-service'
    command: ['npm', 'run', 'start', '-w', 'mock-service']
    environment:
      TEMPLATE_SERVICE_URL: ${TEMPLATE_SERVICE_URL}
      INSTANCE_SERVICE_URL: ${INSTANCE_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      PROCESS_SERVICE_URL: ${PROCESS_SERVICE_URL}
      STORAGE_SERVICE_URL: ${STORAGE_SERVICE_URL}
      GANTT_SERVICE_URL: ${GANTT_SERVICE_URL}
      WORKSPACES_SERVICE_URL: ${WORKSPACE_SERVICE_URL}
      DASHBOARD_SERVICE_URL: ${DASHBOARD_SERVICE_URL}
      USER_SERVICE_MANAGERS_KARTOFFEL_IDS: 5e5688324203fc40043591aa,61d37cb5e4de0300121e31ef
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}
    depends_on:
      - neo4j
      - template-service
      - storage-service
      - instance-service
      - user-service
      - process-service
      - gantt-service
      - workspace-service
      - dashboard-service
    <<: *common

  #-------------------------------------------#
  #        microservices:                     #
  #-------------------------------------------#

  template-service:
    ports:
      - 8002:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  gateway-service:
    ports:
      - 8003:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  user-service:
    ports:
      - 8005:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  storage-service:
    ports:
      - 8006:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  instance-service:
    ports:
      - 8007:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  # frontend-service:
  #   networks:
  #     - network

  nginx:
    ports:
      - 80:80
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  global-search-service:
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  notification-service:
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  activity-log-service:
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  rule-breach-service:
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  process-service:
    ports:
      - 8008:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  gantt-service:
    ports:
      - 8009:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  mailer-service:
    depends_on:
      - redis
    ports:
      - 8010:8000
    <<: *common

  preview-service:
    ports:
      - 8011:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  workspace-service:
    ports:
      - 8012:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  dashboard-service:
    ports:
      - 8017:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  cron-service:
    ports:
      - 8013:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs

  semantic-service:
    ports:
      - 8014:8000
    <<: *common
    volumes:
      - logs:/usr/src/app/logs
      - ../neo4j-graph-rag/src:/app/src

  mock-model-api:
    ports:
      - 8015:8000
    <<: *common

volumes:
  elastic_data:
  logstash_data:
  kibana_data:
  logs: {}

networks:
  network:
    driver: bridge
    name: infra-network
