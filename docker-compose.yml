version: '3.8'

secrets:
  npm_token:
    # the token has an expiration date because gitlab is annoying
    # currently the expiration date is 25/9/26
    file: ./npm_token_secret.txt

services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'user-service'
    command: ['pnpm', '--filter', 'user-service', 'start']
    environment:
      PORT: 8000
      MONGO_URL: ${USER_SERVICE_MONGO_URL}
      MONGO_PERMISSIONS_COLLECTION_NAME: ${MONGO_PERMISSIONS_COLLECTION_NAME}
      MONGO_USERS_COLLECTION_NAME: ${MONGO_USERS_COLLECTION_NAME}
      MONGO_UNITS_COLLECTION_NAME: ${MONGO_UNITS_COLLECTION_NAME}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}

  storage-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'storage-service'
    command: ['pnpm', '--filter', 'storage-service', 'start']
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MINIO_USERS_BUCKET_NAME: ${MINIO_USERS_BUCKET_NAME}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MAX_FILE_BYTE_SIZE: ${MAX_FILE_BYTE_SIZE}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      RABBIT_URL: ${RABBIT_URL}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}
      SYSTEM_MELTA_BASE_URL: ${SYSTEM_MELTA_BASE_URL}

  template-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'template-service'
    command: ['pnpm', '--filter', 'template-service', 'start']
    environment:
      PORT: 8000
      MONGO_URL: ${TEMPLATE_SERVICE_MONGO_URL}
      RABBIT_URL: ${RABBIT_URL}
      MONGO_RELATIONSHIP_TEMPLATES_COLLECTION_NAME: ${MONGO_RELATIONSHIP_TEMPLATES_COLLECTION_NAME}
      MONGO_PRINTING_TEMPLATES_COLLECTION_NAME: ${MONGO_PRINTING_TEMPLATES_COLLECTION_NAME}
      MONGO_RULES_COLLECTION_NAME: ${MONGO_RULES_COLLECTION_NAME}
      MONGO_ENTITY_TEMPLATES_COLLECTION_NAME: ${MONGO_ENTITY_TEMPLATES_COLLECTION_NAME}
      MONGO_CHILD_TEMPLATES_COLLECTION_NAME: ${MONGO_CHILD_TEMPLATES_COLLECTION_NAME}
      MONGO_CATEGORIES_COLLECTION_NAME: ${MONGO_CATEGORIES_COLLECTION_NAME}
      MONGO_CONFIGS_COLLECTION_NAME: ${MONGO_CONFIGS_COLLECTION_NAME}
      TEMPLATE_SERVICE_URL: ${TEMPLATE_SERVICE_URL}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}

  instance-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'instance-service'
    command: ['pnpm', '--filter', 'instance-service', 'start']
    environment:
      PORT: 8000
      RABBIT_URL: ${RABBIT_URL}
      NEO4J_URL: ${NEO4J_URL}
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE}
      NEO4J_WORKSPACE_NAME_PREFIX: ${NEO4J_WORKSPACE_NAME_PREFIX}
      TEMPLATE_SERVICE_URL: ${TEMPLATE_SERVICE_URL}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}

  global-search-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'global-search-service'
    command: ['pnpm', '--filter', 'global-search-service', 'start']
    environment:
      NEO4J_URL: ${NEO4J_URL}
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE}
      NEO4J_WORKSPACE_NAME_PREFIX: ${NEO4J_WORKSPACE_NAME_PREFIX}
      TEMPLATE_SERVICE_URL: ${TEMPLATE_SERVICE_URL}
      RABBIT_URL: ${RABBIT_URL}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}

  activity-log-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'activity-log-service'
    command: ['pnpm', '--filter', 'activity-log-service', 'start']
    environment:
      PORT: 8000
      MONGO_URL: ${ACTIVITY_LOG_SERVICE_MONGO_URL}
      MONGO_ACTIVITIES_COLLECTION_NAME: ${ACTIVITIES_COLLECTION_NAME}
      RABBIT_URL: ${RABBIT_URL}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'notification-service'
    command: ['pnpm', '--filter', 'notification-service', 'start']
    environment:
      PORT: 8000
      MONGO_URL: ${NOTIFICATION_SERVICE_MONGO_URL}
      MONGO_NOTIFICATIONS_COLLECTION_NAME: ${MONGO_NOTIFICATIONS_COLLECTION_NAME}
      RABBIT_URL: ${RABBIT_URL}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}

  rule-breach-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'rule-breach-service'
    command: ['pnpm', '--filter', 'rule-breach-service', 'start']
    environment:
      PORT: 8000
      MONGO_URL: ${RULE_BREACH_SERVICE_MONGO_URL}
      MONGO_RULE_BREACH_ALERTS_COLLECTION_NAME: ${MONGO_RULE_BREACH_ALERTS_COLLECTION_NAME}
      MONGO_RULE_BREACH_REQUESTS_COLLECTION_NAME: ${MONGO_RULE_BREACH_REQUESTS_COLLECTION_NAME}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}

  process-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'process-service'
    command: ['pnpm', '--filter', 'process-service', 'start']
    environment:
      PORT: 8000
      MONGO_URL: ${PROCESS_SERVICE_MONGO_URL}
      MONGO_PROCESS_TEMPLATES_COLLECTION_NAME: ${MONGO_PROCESS_TEMPLATES_COLLECTION_NAME}
      MONGO_PROCESS_INSTANCES_COLLECTION_NAME: ${MONGO_PROCESS_INSTANCES_COLLECTION_NAME}
      MONGO_STEP_TEMPLATES_COLLECTION_NAME: ${MONGO_STEP_TEMPLATES_COLLECTION_NAME}
      MONGO_STEP_INSTANCES_COLLECTION_NAME: ${MONGO_STEP_INSTANCES_COLLECTION_NAME}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_CLIENT_URL: ${ELASTIC_CLIENT_URL}
      ELASTIC_PROCESS_SEARCH_INDEX: ${ELASTIC_PROCESS_SEARCH_INDEX}
      EXCLUDED_KEYS: ${EXCLUDED_KEYS}
      RABBIT_URL: ${RABBIT_URL}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}

  gantt-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'gantt-service'
    command: ['pnpm', '--filter', 'gantt-service', 'start']
    environment:
      PORT: 8000
      MONGO_URL: ${GANTT_SERVICE_MONGO_URL}
      MONGO_GANTTS_COLLECTION_NAME: ${MONGO_GANTTS_COLLECTION_NAME}
      MONGO_IFRAMES_COLLECTION_NAME: ${MONGO_IFRAMES_COLLECTION_NAME}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}

  preview-service:
    build:
      context: .
      dockerfile: ./preview-service/Dockerfile
      args:
        SERVICE_NAME: 'preview-service'
    command: ['pnpm', '--filter', 'preview-service', 'start']
    environment:
      PORT: 8000
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MAX_FILE_BYTE_SIZE: ${MAX_FILE_BYTE_SIZE}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      RABBIT_URL: ${RABBIT_URL}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}

  workspace-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'workspace-service'
    command: ['pnpm', '--filter', 'workspace-service', 'start']
    environment:
      PORT: 8000
      MONGO_URL: ${WORKSPACE_SERVICE_MONGO_URL}
      MONGO_WORKSPACES_COLLECTION_NAME: ${MONGO_WORKSPACES_COLLECTION_NAME}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}

  dashboard-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'dashboard-service'
    command: ['pnpm', '--filter', 'dashboard-service', 'start']
    environment:
      PORT: 8000
      MONGO_URL: ${DASHBOARD_SERVICE_MONGO_URL}
      MONGO_CHARTS_COLLECTION_NAME: ${MONGO_CHART_COLLECTION_NAME}
      MONGO_DASHBOARD_COLLECTION_NAME: ${MONGO_DASHBOARD_COLLECTION_NAME}
      MONGO_IFRAMES_COLLECTION_NAME: ${MONGO_IFRAMES_COLLECTION_NAME}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}

  mock-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'mock-service'
    command: ['pnpm', '--filter', 'mock-service', 'start']
    environment:
      TEMPLATE_SERVICE_URL: ${TEMPLATE_SERVICE_URL}
      INSTANCE_SERVICE_URL: ${INSTANCE_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      PROCESS_SERVICE_URL: ${PROCESS_SERVICE_URL}
      STORAGE_SERVICE_URL: ${STORAGE_SERVICE_URL}
      GANTT_SERVICE_URL: ${GANTT_SERVICE_URL}
      WORKSPACES_SERVICE_URL: ${WORKSPACE_SERVICE_URL}
      DASHBOARD_SERVICE_URL: ${DASHBOARD_SERVICE_URL}
      USER_SERVICE_MANAGERS_KARTOFFEL_IDS: 5e5688324203fc40043591aa,61d37cb5e4de0300121e31ef
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
      args:
        SERVICE_NAME: 'gateway-service'
      secrets:
        - npm_token
    environment:
      PORT: 8000
      TOKEN_SECRET: ${TOKEN_SECRET}
      TEMPLATE_SERVICE_URL: ${TEMPLATE_SERVICE_URL}
      INSTANCE_SERVICE_URL: ${INSTANCE_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      STORAGE_SERVICE_URL: ${STORAGE_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      RULE_BREACH_SERVICE_URL: ${RULE_BREACH_SERVICE_URL}
      PROCESS_SERVICE_URL: ${PROCESS_SERVICE_URL}
      GANTT_SERVICE_URL: ${GANTT_SERVICE_URL}
      WORKSPACE_SERVICE_URL: ${WORKSPACE_SERVICE_URL}
      KARTOFFEL_BASE_URL: ${KARTOFFEL_BASE_URL}
      CALLBACK_URL: ${CALLBACK_URL}
      SHRAGA_URL: ${SHRAGA_URL}
      ACCESS_TOKEN_NAME: ${ACCESS_TOKEN_NAME}
      SYSTEM_UNAVAILABLE_URL: ${SYSTEM_UNAVAILABLE_URL}
      ACTIVITY_LOG_SERVICE_URL: ${ACTIVITY_LOG_SERVICE_URL}
      NODE_TLS_REJECT_UNAUTHORIZED: 0
      RABBIT_URL: ${RABBIT_URL}
      PREVIEW_SERVICE_URL: ${PREVIEW_SERVICE_URL}
      SYSTEM_MELTA_BASE_URL: ${SYSTEM_MELTA_BASE_URL}
      BASIC_AUTHENTICATION_USERS: ${BASIC_AUTHENTICATION_USERS}
      NOTIFICATIONS_MAIL_FROM: ${MAIL_USER}
      MAX_FILE_BYTE_SIZE: ${MAX_FILE_BYTE_SIZE}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}
      SEMANTIC_SEARCH_SERVICE: ${SEMANTIC_SEARCH_SERVICE}
      FRONTEND_CONFIG_MATOMO_BASE_URL: http://localhost:8016
      FRONTEND_CONFIG_MATOMO_SITE_ID: 1
      DASHBOARD_SERVICE_URL: ${DASHBOARD_SERVICE_URL}
      AI_SUMMARY_SERVICE_URL: http://semantic-service:8000/api/semantic
      FRONTEND_MAP_CAPABILITIES_URL: ${FRONTEND_MAP_CAPABILITIES_URL}
      AI_SUMMARY_SERVICE_REQUEST_TIMEOUT: ${AI_SUMMARY_SERVICE_REQUEST_TIMEOUT}

  # frontend-service:
  #   build:
  #     context: ./frontend-service
  #     dockerfile: Dockerfile
  #     args:
  #       SERVICE_NAME: 'frontend-service'

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx:/etc/nginx/conf.d

  mailer-service:
    image: registry.gitlab.com/yesodot/rnd/terminal-rabaz/dropbox/microservices/mailer-service:latest
    environment:
      PORT: 8000
      MAIL_HOSTS: ${MAIL_HOSTS}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      USE_AUTH: 'true'
      RABBIT_URI: ${RABBIT_URL}
      REDIS_CONNECTION_URI: ${REDIS_HOST}

  cron-service:
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        SERVICE_NAME: 'cron-service'
    command: ['pnpm', '--filter', 'cron-service', 'start']
    environment:
      PORT: 8000
      NODE_TLS_REJECT_UNAUTHORIZED: 0
      INSTANCE_SERVICE_URL: ${INSTANCE_SERVICE_URL}
      TEMPLATE_SERVICE_URL: ${TEMPLATE_SERVICE_URL}
      WORKSPACE_SERVICE_URL: ${WORKSPACE_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      RABBIT_URL: ${RABBIT_URL}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      WORKSPACE_ID_HEADER_NAME: ${WORKSPACE_ID_HEADER_NAME}
      DISPLAY_CRON_DATES: ${DISPLAY_CRON_DATES}
      KARTOFFEL_BASE_URL: ${KARTOFFEL_BASE_URL}

  semantic-service:
    build:
      context: .
      dockerfile: semantic-service/Dockerfile
      args:
        SERVICE_NAME: 'semantic-service'
    command: ['pnpm', '--filter', 'semantic-service', 'start']
    environment:
      PORT: 8000
      RABBIT_URL: ${RABBIT_URL}
      ELASTIC_CLIENT_URL: ${SEMANTIC_ELASTIC_CLIENT_URL}
      ELASTIC_APM_ACTIVE: ${ELASTIC_APM_ACTIVE}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MAX_REQUEST_BYTE_SIZE: ${MAX_REQUEST_BYTE_SIZE}
      MODEL_API_URL: ${MODEL_API_URL}
      ELASTIC_RRF_WINDOW_FIELD_NAME: ${ELASTIC_RRF_WINDOW_FIELD_NAME}
      OPENAI_BASE_URL: http://host.docker.internal:11434/v1
      OPENAI_API_KEY: ollama
      OPENAI_MODEL: qwen2.5-coder:0.5b
      MAX_UPLOAD_FILES: 10
      LOG_PREVIEW_LENGTH: 100
      OPENAI_MAX_INPUT_CHARS: 100000
      OPENAI_TIMEOUT: 120000
      OPENAI_TEMPERATURE: 0.3
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mock-model-api:
    build:
      context: ./scripts/mock-model-api
      dockerfile: Dockerfile
    environment:
      JINA_API_KEY: ${JINA_API_KEY}
