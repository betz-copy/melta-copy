name: CI

on:
  pull_request:
    branches: [dev, main, preprod]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure npm for GitLab registry
        run: |
          echo "@yesodot:registry=https://gitlab.com/api/v4/projects/29372887/packages/npm/" >> ~/.npmrc
          echo "//gitlab.com/api/v4/projects/29372887/packages/npm/:_authToken=${{ secrets.GITLAB_NPM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: npm ci

      - name: Run Biome
        run: npm run biome

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
