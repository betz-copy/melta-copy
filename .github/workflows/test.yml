name: CI

on:
  pull_request:
    branches: [dev, main, preprod]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Biome
        run: npm run biome

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
