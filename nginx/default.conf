server {

    listen 80;

    location /api {
        proxy_pass http://gateway-service:8000/api;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    location / {
        # proxy_pass http://frontend-service:8000; 
        proxy_pass http://172.17.0.1:3000; # for local development, run react with `npm run start:docker`
    }

    # only for local development anyways - in prod not relevant (using k8s)
    client_max_body_size 1000M;
    client_body_buffer_size 1000M;
}
