server {
    listen 80;
    
    location /api/auth {
        proxy_pass http://authentication-service:8000/api/auth;
    }

    location /api {
        proxy_pass http://backend:8000/api;
    }

    location / {
        proxy_pass http://frontend:8000; 
        # proxy_pass http://host.docker.internal:3000; # for local development, run react with `npm run start:docker`
    }
}
