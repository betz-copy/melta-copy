services:
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile.dev
      secrets:
        - npm_token
    volumes:
      - ./gateway-service/src:/usr/src/app/gateway-service/src 
      - logs:/usr/src/app/logs
      - /usr/src/app/gateway-service/node_modules
    ports:
      - "8003:8000"
    profiles:
      - nodemon

  activity-log-service:
    build:
      context: .
      dockerfile: Dockerfile.base.dev
      args:
        SERVICE_NAME: 'activity-log-service'
    command: ['pnpm', '--filter', 'activity-log-service', 'dev:nodemon']
    profiles:
      - nodemon
    volumes:
      - ./activity-log-service/src:/usr/src/app/activity-log-service/src 
      - logs:/usr/src/app/logs
      - /usr/src/app/activity-log-service/node_modules

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.base.dev
      args:
        SERVICE_NAME: 'user-service'
    command: ['pnpm', '--filter', 'user-service', 'dev:nodemon']
    profiles:
      - nodemon
    volumes:
      - ./user-service/src:/usr/src/app/user-service/src 
      - logs:/usr/src/app/logs
      - /usr/src/app/user-service/node_modules

  storage-service:
    build:
      context: .
      dockerfile: Dockerfile.base.dev
      args:
        SERVICE_NAME: 'storage-service'
    command: ['pnpm', '--filter', 'storage-service', 'run', 'dev:nodemon']
    profiles:
      - nodemon
    volumes:
      - ./storage-service/src:/usr/src/app/storage-service/src 
      - logs:/usr/src/app/logs
      - /usr/src/app/storage-service/node_modules

  template-service:
    build:
      context: .
      dockerfile: Dockerfile.base.dev
      args:
        SERVICE_NAME: 'template-service'
    command: ['pnpm', '--filter', 'template-service', 'dev:nodemon']
    profiles:
      - nodemon
    volumes:
      - ./template-service/src:/usr/src/app/template-service/src 
      - logs:/usr/src/app/logs
      - /usr/src/app/template-service/node_modules

  instance-service:
    build:
      context: .
      dockerfile: Dockerfile.base.dev
      args:
        SERVICE_NAME: 'instance-service'
    command: ['pnpm', '--filter', 'instance-service', 'dev:nodemon']
    profiles:
      - nodemon
    volumes:
      - ./instance-service/src:/usr/src/app/instance-service/src 
      - logs:/usr/src/app/logs
      - /usr/src/app/instance-service/node_modules

  global-search-service:
    build:
      context: .
      dockerfile: Dockerfile.base.dev
      args:
        SERVICE_NAME: 'global-search-service'
    command: ['pnpm', '--filter', 'global-search-service', 'dev:nodemon']
    profiles:
      - nodemon
    volumes:
      - ./global-search-service/src:/usr/src/app/global-search-service/src 
      - logs:/usr/src/app/logs
      - /usr/src/app/global-search-service/node_modules
    environment:
      - NEO4J_CONNECTION_RETRIES=10

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.base.dev
      args:
        SERVICE_NAME: 'notification-service'
    command: ['pnpm', '--filter', 'notification-service', 'dev:nodemon']
    profiles:
