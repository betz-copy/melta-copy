name: 'gateway-service'
replicaCount: 1

images:
    PullSecrets: [jawsreg]
    repository: jawsproject.azurecr.io/gateway-service
    tag: latest

service:
    ports:
        - name: http
          port: '8000'

config:
    configmaps: []
    env:
        - name: PORT
          value: 8000
        - name: TOKEN_SECRET
          value: secret
        - name: ENTITY_TEMPLATE_SERVICE_URL
          value: http://entity-template-service:8000
        - name: RELATIONSHIP_TEMPLATE_SERVICE_URL
          value: http://relationship-template-service:8000
        - name: INSTANCE_SERVICE_URL
          value: http://instance-service:8000
        - name: PERMISSION_SERVICE_BASE_URL
          value: http://permission-service:8000
        - name: STORAGE_SERVICE_URL
          value: http://storage-service:8000
        - name: ACTIVITY_LOG_SERVICE_URL
          value: http://activity-log-service:8000
        - name: NOTIFICATION_SERVICE_URL
          value: http://notification-service:8000
        - name: PROCESS_SERVICE_URL
          value: http://process-service:8000
        - name: GANTT_SERVICE_URL
          value: http://gantt-service:8000
        - name: KARTOFFEL_BASE_URL
          value: https://kartoffel.branch-yesodot.org
        - name: CALLBACK_URL
          value: http://jaws.branch-yesodot.org/api/auth/callback
        - name: SHRAGA_URL
          value: https://shraga.shraga.branch-yesodot.org
        - name: ACCESS_TOKEN_NAME
          value: rabaz-access-token
        - name: SYSTEM_UNAVAILABLE_URL
          value: /unavailable
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: '0'
        - name: NOTIFICATION_SERVICE_URL
          value: http://notification-service:8000
        - name: RULE_BREACH_SERVICE_URL
          value: http://rule-breach-service:8000
        - name: RABBIT_URL
          value: amqp://jaws:jawsAreTheBest@20.105.9.117:5672/jaws
        - name: STORAGE_SERVICE_FILE_HYPER_LINK
          value: http://localhost/api/files
        - name: DATE_ALERT_TIME
          value: '0 0 * * *'
        - name: BASIC_AUTHENTICATION_USERS
          value: []

livenessProbe:
    httpGet:
        path: /health
        port: 8000

readinessProbe:
    httpGet:
        path: /health
        port: 8000

ingress:
    enabled: true
    hosts:
        - host: jaws.branch-yesodot.org
          paths:
              - path: /api
                service: gateway-service
                port: '8000'
