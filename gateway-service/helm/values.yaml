name: "backend"
replicaCount: 1

images:
  PullSecrets: [jawsreg]
  repository: jawsproject.azurecr.io/backend
  tag: latest

service:
  ports:
  - name: http
    port: "8000"

config:
  configmaps: []
  env:
    - name: PORT
      value: "'8000'"
    - name: TOKEN_SECRET
      value: "secret"
    - name: ENTITY_TEMPLATE_MANAGER_URI
      value: "http://entity-template-manager:8000"
    - name: STORAGE_SERVICE_URI
      value: "http://storage-service:8000"
    - name: CALLBACK_URL
      value: "http://jaws.branch-yesodot.org/api/auth/callback"
    - name: SHRAGA_URL
      value: "https://shraga.shraga.branch-yesodot.org"
    - name: ACCESS_TOKEN_NAME
      value: "rabaz-access-token"
    - name: SYSTEM_UNAVAILABLE_URL
      value: "/unavailable"

livenessProbe:
  httpGet:
    path: /health
    port: 8000

readinessProbe:
  httpGet:
    path: /health
    port: 8000

ingress:
  enabled: true
  hosts:
    - host: jaws.branch-yesodot.org
      paths:
        - path: /api
          service: backend
          port: '8000'


